<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishalini B | Web Developer & UI/UX Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            colors: {
              accent: {
                light: '#10b981',
                DEFAULT: '#059669',
                dark: '#047857',
              }
            }
          }
        }
      }
    </script>
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .dark .glass {
        background: rgba(17, 24, 39, 0.7);
      }
      .blob {
        position: absolute;
        filter: blur(60px);
        z-index: -1;
        opacity: 0.3;
        border-radius: 50%;
      }
    </style>

    <script type="importmap">

          "lucide-react": "https://esm.sh/lucide-react@0.474.0",
          "@emailjs/browser": "https://esm.sh/@emailjs/browser@4.4.1",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/"
        }
      }
    </script>

    <link rel="stylesheet" href="/index.css">

  <body class="bg-slate-50 text-slate-900 dark:bg-gray-950 dark:text-slate-100 font-sans transition-colors duration-300">
